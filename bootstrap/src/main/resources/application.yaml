spring:
  application:
    name: app-platform
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB
  # Profile mac dinh "local" neu khong set SPRING_PROFILES_ACTIVE (may dev).
  # Production / staging / dev: bat SPRING_PROFILES_ACTIVE=prod|staging|dev tren server hoac trong CI.
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  autoconfigure:
    exclude:
      - org.springframework.boot.data.redis.autoconfigure.DataRedisAutoConfiguration
      - org.springframework.boot.kafka.autoconfigure.KafkaAutoConfiguration
      - org.springframework.boot.kafka.autoconfigure.metrics.KafkaMetricsAutoConfiguration
  datasource:
    url: jdbc:postgresql://localhost:5432/sale_app
    username: postgres
    password:
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2s
      repositories:
        enabled: false
    web:
      pageable:
        max-page-size: 100
        one-indexed-parameters: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    client-id: ${KAFKA_CLIENT_ID:${spring.application.name}}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: ${KAFKA_PRODUCER_RETRIES:3}
      properties:
        enable.idempotence: true
        linger.ms: 5
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP_ID:${spring.application.name}-consumer}
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    listener:
      ack-mode: manual_immediate
  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: always

logging:
  file:
    # Promtail (docker compose) doc file log nay de day len Loki.
    name: ${LOG_FILE_PATH:./logs/app.log}
  level:
    root: INFO

app:
  storage:
    minio:
      enabled: ${APP_STORAGE_MINIO_ENABLED:false}
      endpoint: ${MINIO_ENDPOINT:http://127.0.0.1:9000}
      region: ${MINIO_REGION:us-east-1}
      access-key: ${MINIO_ACCESS_KEY:}
      secret-key: ${MINIO_SECRET_KEY:}
      bucket: ${MINIO_BUCKET:sale-app-files}
      auto-create-bucket: ${MINIO_AUTO_CREATE_BUCKET:false}
  authz:
    # db | opa
    mode: ${APP_AUTHZ_MODE:db}
    dynamic:
      # true = endpoint khong map trong authz.resources -> deny (khuyen nghi production)
      # false = endpoint khong map -> allow
      default-deny: ${APP_AUTHZ_DYNAMIC_DEFAULT_DENY:true}
    opa:
      url: ${OPA_URL:http://localhost:8181}
      # OPA Data API path that returns boolean decision.
      policy-path: ${OPA_POLICY_PATH:v1/data/sale/authz/allow}
  kafka:
    enabled: ${APP_KAFKA_ENABLED:false}
    topic-prefix: app-platform
    outbox:
      publish-interval-ms: 2000
      batch-size: 50
  redis:
    enabled: ${APP_REDIS_ENABLED:false}
    key-prefix: app-platform
  mongodb:
    enabled: ${APP_MONGODB_ENABLED:false}
    uri: ${MONGODB_URI:mongodb://localhost:27017}
    database: ${MONGODB_DATABASE:sale_app_mongo}
  chat:
    ws:
      # Comma-separated allowed origin patterns for websocket handshake.
      allowed-origin-patterns: ${APP_CHAT_WS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*}
  security:
    cors:
      # Comma-separated FE origins allowed for REST API CORS.
      allowed-origins: ${APP_SECURITY_CORS_ALLOWED_ORIGINS:http://localhost:3002,http://localhost:3000}
    permit-all:
      - method: POST
        path: /api/auth/login
      - method: POST
        path: /api/auth/register
      - method: POST
        path: /api/auth/refresh
      - method: GET
        path: /ws/chat
      - method: GET
        path: /ws/chat/**
      - method: GET
        path: /chat-test.html
      - method: GET
        path: /api/health
      - method: GET
        path: /api/admin/users/search
      - method: GET
        path: /actuator/health
      - method: GET
        path: /actuator/prometheus
      - method: GET
        path: /api/demo/redis-counter
      - method: GET
        path: /api/demo/redis-counter/read
      - method: POST
        path: /api/demo/redis-student-object
      - method: GET
        path: /api/demo/redis-student-object/**
      - method: GET
        path: /api/demo/kafka-ping
      - method: GET
        path: /api/demo/kafka-echo
      - method: GET
        path: /api/demo/kafka-ping-dlq
      - method: POST
        path: /api/demo/minio/upload
      - method: GET
        path: /api/demo/minio/health
      - method: GET
        path: /api/demo/minio/preview
      - method: POST
        path: /api/demo/minio/backfill-versions
      - method: POST
        path: /api/demo/mongo-student-notes
      - method: GET
        path: /api/demo/mongo-student-notes/**
      - method: GET
        path: /swagger-ui/**
      - method: GET
        path: /swagger-ui.html
      - method: GET
        path: /v3/api-docs/**
    jwt:
      secret: ${JWT_SECRET:dev-only-change-in-production-min-32-chars-ok}
      issuer: app-platform
      expiration-seconds: 86400
      refresh-expiration-seconds: 604800

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
