# Profile local — SPRING_PROFILES_ACTIVE=local (mac dinh trong application.yaml).
#
# Docker (Kafka + Kafka UI + Redis + Redis Insight + Prometheus + Grafana):  docker compose up -d
#   Kafka UI: http://localhost:8089  |  Redis: localhost:6379  |  Redis Insight: http://localhost:8092 (add DB: host redis, 6379)
#   Prometheus: http://localhost:9090  |  Grafana: http://localhost:3000 (admin / admin — đổi mật khẩu)
#   Chạy app trên máy (java -jar / IDE) để Prometheus scrape http://host.docker.internal:8080/actuator/prometheus
#
# PostgREST: docker compose up -d postgrest
#   curl -s http://localhost:3001/rpc/list_customers -H "Content-Type: application/json" -d '{"p_limit":20,"p_offset":0}'
#
# MinIO (S3-compatible, local): docker compose up -d minio
#   Console: http://localhost:9005  (user/pass dev: minioadmin / minioadmin)
#   S3 API:  http://localhost:9000
#   Tao bucket `sale-app-files` trong console truoc khi upload qua API demo.
#
# Postgres: tren may (localhost:5432). Tao DB sale_app neu chua co, user/pass khop duoi.
#   Mat khau rong: SPRING_DATASOURCE_PASSWORD= hoac bo trong gia tri mac dinh.

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/sale_app
    username: ${SPRING_DATASOURCE_USERNAME:sale_app_user}
    # User app runtime (khong superuser) de PostgreSQL RLS co hieu luc.
    password: ${SPRING_DATASOURCE_PASSWORD:}
  flyway:
    # Flyway can su dung owner account de tao/sua policy, owner table, function...
    # Runtime van dung spring.datasource (sale_app_user) de RLS co hieu luc.
    user: ${SPRING_FLYWAY_USER:postgres}
    password: ${SPRING_FLYWAY_PASSWORD:postgres}
  batch:
    jdbc:
      # Tu dong tao cac bang he thong BATCH_* cho Spring Batch khi chay local.
      initialize-schema: always
  kafka:
    producer:
      properties:
        max.block.ms: 5000
        # Bat buoc >= request.timeout.ms + linger (mac dinh ~30s). 10s se lam KafkaProducer khong khoi tao duoc.
        delivery.timeout.ms: 120000
  # Gửi SMTP thật (khi cấu hình): consumer topic mail.queued sẽ dùng JavaMailSender.
  # mail:
  #   host: smtp.example.com
  #   port: 587
  #   username: ${MAIL_USER:}
  #   password: ${MAIL_PASSWORD:}
  #   properties:
  #     mail.smtp.auth: true
  #     mail.smtp.starttls.enable: true
  data:
    redis:
      # Khoi voi service `redis` trong docker-compose (cong 6379); doi neu chay Redis rieng.
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

logging:
  level:
    com.klb.app: DEBUG

app:
  kafka:
    enabled: true
    outbox:
      relay-enabled: false
  redis:
    enabled: true
  mongodb:
    enabled: true
  storage:
    minio:
      enabled: true
      endpoint: ${MINIO_ENDPOINT:http://127.0.0.1:9000}
      access-key: ${MINIO_ACCESS_KEY:minioadmin}
      secret-key: ${MINIO_SECRET_KEY:minioadmin}
      bucket: ${MINIO_BUCKET:sale-app-files}
      auto-create-bucket: ${MINIO_AUTO_CREATE_BUCKET:true}
