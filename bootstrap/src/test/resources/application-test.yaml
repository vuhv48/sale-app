spring:
  datasource:
    url: jdbc:h2:mem:sale_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false
  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false

app:
  security:
    jwt:
      secret: test-secret-at-least-32-characters-long
      issuer: app-platform-test
      expiration-seconds: 3600
      refresh-expiration-seconds: 7200
