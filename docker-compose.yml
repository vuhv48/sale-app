# PostgreSQL cho local dev — khớp bootstrap/src/main/resources/application.yaml
# Chạy: docker compose up -d
# Dừng: docker compose down  (thêm -v nếu muốn xóa volume dữ liệu)

services:
  postgres:
    image: postgres:16-alpine
    container_name: sale-app-postgres
    environment:
      POSTGRES_DB: sale_app
      POSTGRES_USER: sale
      POSTGRES_PASSWORD: sale
    ports:
      - "5432:5432"
    volumes:
      - sale_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sale -d sale_app"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  sale_pg_data:
