# Local dev: Kafka (KRaft) + Kafka UI + Redis — chay tren Docker (ARM64 / Apple Silicon ok).
# Postgres: dung ban cai tren may (Homebrew...) tranh trung cong 5432 voi container.
#
# Anh bitnami/kafka tren Docker Hub khong con tag cong khai; dung bitnamilegacy/kafka (cung cau hinh ENV).
#
# Chay: docker compose up -d
# Dung: docker compose down
#
# Kafka UI: http://localhost:8089
# Kafka Connect (Debezium): http://localhost:8083
# Redis: localhost:6379 (profile local: app.redis.enabled=true)
# Redis Insight (GUI, ARM64 ok): http://localhost:8092 — them DB: host `redis`, port `6379`
# PostgREST (RPC tu Postgres): http://localhost:3001 — can Flyway V13 + Postgres tren host :5432
# Prometheus: http://localhost:9090  |  Grafana: http://localhost:3000 (admin / admin — doi ngay)
# Loki (logs): http://localhost:3100 | Promtail doc ./logs/app.log day vao Loki
# MinIO (S3-compatible object storage, local dev):
#   - S3 API: http://localhost:9000
#   - Console UI: http://localhost:9005 (map 9001 -> 9005 de tranh trung port)
#   - Default creds (dev only): minioadmin / minioadmin
# App Spring chay tren may host: scrape /actuator/prometheus qua host.docker.internal:8080
# App Spring: spring.kafka.bootstrap-servers=localhost:9092 (mac dinh application.yaml)

services:
  kafka:
    image: docker.io/bitnamilegacy/kafka:4.0.0-debian-12-r10
    container_name: sale-app-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: "0"
      KAFKA_CFG_PROCESS_ROLES: "controller,broker"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "0@kafka:9093"
      # PLAINTEXT: may host (Spring, kcat). DOCKER: container trong mang compose (kafka-ui).
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,DOCKER://:9094,CONTROLLER://:9093"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://localhost:9092,DOCKER://kafka:9094"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,DOCKER:PLAINTEXT"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: "DOCKER"
      ALLOW_PLAINTEXT_LISTENER: "yes"

  kafka-ui:
    image: docker.io/provectuslabs/kafka-ui:latest
    container_name: sale-app-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8089:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9094

  kafka-connect:
    image: quay.io/debezium/connect:2.7.3.Final
    container_name: sale-app-kafka-connect
    depends_on:
      - kafka
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:9094
      GROUP_ID: sale-app-connect-cluster
      CONFIG_STORAGE_TOPIC: sale-app-connect-configs-v2
      OFFSET_STORAGE_TOPIC: sale-app-connect-offsets-v2
      STATUS_STORAGE_TOPIC: sale-app-connect-statuses-v2
      CONFIG_STORAGE_REPLICATION_FACTOR: "1"
      OFFSET_STORAGE_REPLICATION_FACTOR: "1"
      STATUS_STORAGE_REPLICATION_FACTOR: "1"
      OFFSET_STORAGE_PARTITIONS: "1"
      STATUS_STORAGE_PARTITIONS: "1"
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_REST_ADVERTISED_HOST_NAME: kafka-connect
      CONNECT_PLUGIN_PATH: /kafka/connect

  redis:
    image: docker.io/redis:7-alpine
    container_name: sale-app-redis
    ports:
      - "6379:6379"

  minio:
    image: docker.io/minio/minio:RELEASE.2025-04-08T15-41-24Z
    container_name: sale-app-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9005:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data

  # Postgres chay tren host (application-local.yaml). PostgREST doc function schema demo_rpc.
  postgrest:
    image: docker.io/postgrest/postgrest:v12.2.3
    container_name: sale-app-postgrest
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "3001:3000"
    environment:
      PGRST_DB_URI: postgres://postgrest_authenticator:postgrest_dev_secret@host.docker.internal:5432/sale_app
      PGRST_DB_SCHEMAS: demo_rpc
      PGRST_DB_ANON_ROLE: postgrest_anon

  # rediscommander chi co linux/amd64 -> loi Apple Silicon; dung image chinh thuc co arm64.
  redis-insight:
    image: docker.io/redis/redisinsight:latest
    container_name: sale-app-redis-insight
    depends_on:
      - redis
    ports:
      - "8092:5540"
    environment:
      # Bo qua man EULA lan dau (dev local)
      RI_ACCEPT_TERMS_AND_CONDITIONS: "true"

  prometheus:
    image: docker.io/prom/prometheus:v2.55.1
    container_name: sale-app-prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"

  loki:
    image: docker.io/grafana/loki:3.2.1
    container_name: sale-app-loki
    ports:
      - "3100:3100"
    command:
      - "-config.file=/etc/loki/local-config.yaml"
    volumes:
      - ./observability/loki/config.yml:/etc/loki/local-config.yaml:ro

  promtail:
    image: docker.io/grafana/promtail:3.2.1
    container_name: sale-app-promtail
    depends_on:
      - loki
    command:
      - "-config.file=/etc/promtail/config.yml"
    volumes:
      - ./observability/promtail/config.yml:/etc/promtail/config.yml:ro
      - ./logs:/var/log/sale-app

  grafana:
    image: docker.io/grafana/grafana:11.4.0
    container_name: sale-app-grafana
    depends_on:
      - prometheus
      - loki
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: http://localhost:3000
    volumes:
      - grafana-data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro

volumes:
  grafana-data:
  minio-data:
