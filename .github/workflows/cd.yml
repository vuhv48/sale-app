name: CD

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-publish:
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      DOCKERHUB_REPOSITORY: ${{ secrets.DOCKERHUB_REPOSITORY }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate Docker Hub secrets
        run: |
          test -n "${DOCKERHUB_USERNAME}" || (echo "Missing secret: DOCKERHUB_USERNAME" && exit 1)
          test -n "${DOCKERHUB_TOKEN}" || (echo "Missing secret: DOCKERHUB_TOKEN" && exit 1)
          test -n "${DOCKERHUB_REPOSITORY}" || (echo "Missing secret: DOCKERHUB_REPOSITORY" && exit 1)

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.DOCKERHUB_REPOSITORY }}:latest
            ${{ env.DOCKERHUB_REPOSITORY }}:${{ github.sha }}

      - name: Publish completed
        run: |
          echo "Published image:"
          echo " - ${{ env.DOCKERHUB_REPOSITORY }}:latest"
          echo " - ${{ env.DOCKERHUB_REPOSITORY }}:${GITHUB_SHA}"
