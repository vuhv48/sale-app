# CI: build + test (profile test: H2 in-memory, Flyway/Kafka/Redis/Mongo off).
# Canh nhanh: GitHub repo -> Settings -> Actions -> cho phep workflow (neu private).

name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Maven verify
        run: ./mvnw -B verify
