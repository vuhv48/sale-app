server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: sale-app
    static_configs:
      - targets:
          - localhost
        labels:
          job: sale-app
          app: app-platform
          env: local
          __path__: /var/log/sale-app/*.log
