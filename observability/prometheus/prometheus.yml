# Scrape Spring Boot (Micrometer) — app chạy trên máy host, port 8080 mặc định.
# Đổi targets nếu bạn dùng server.port khác.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: spring-app-platform
    metrics_path: /actuator/prometheus
    scheme: http
    static_configs:
      - targets:
          - host.docker.internal:8080
        labels:
          application: app-platform
